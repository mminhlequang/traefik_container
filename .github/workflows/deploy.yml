name: Deploy Traefik

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-traefik
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.head_commit.message, 'deploy')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      VPS_HOST: 64.226.99.249
      VPS_USER: root
      DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH || '/root/traefik_container' }}

    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh "$VPS_USER@$VPS_HOST" bash -s -- "$DEPLOY_PATH" <<'EOF'
            set -Eeuo pipefail

            DEPLOY_PATH="$1"
            cd "$DEPLOY_PATH"

            git fetch origin main
            git reset --hard origin/main

            docker compose -f docker-compose.traefik.yml config --quiet
            docker compose -f docker-compose.traefik.yml pull
            docker compose -f docker-compose.traefik.yml up -d --remove-orphans

            docker compose -f docker-compose.traefik.yml ps
          EOF
